# Persistence overlay merged into the base compose by the devcontainer CLI.
# Keeps shell history, ~/.config, ~/.claude, and the VS Code server extensions
# in named volumes so they survive container rebuilds. Mounts the host SSH dir
# read-only for git/gh.
services:
  workspace:
    environment:
      HISTFILE: /commandhistory/.bash_history
      PROMPT_COMMAND: 'history -a; history -c; history -r'
    volumes:
      - persistent-config-data:/home/node/.config
      - persistent-claude-data:/home/node/.claude
      - persistent-vscode-server:/home/node/.vscode-server/extensions
      - persistent-bash-history:/commandhistory
      - ${HOME}/.ssh:/home/node/.ssh:ro
volumes:
  persistent-config-data:
    name: ${DEVCONTAINER_CONFIG_VOLUME:-persistent-config-data}
  persistent-claude-data:
    name: ${DEVCONTAINER_CLAUDE_DATA_VOLUME:-persistent-claude-data}
  persistent-vscode-server:
    name: ${DEVCONTAINER_VSCODE_SERVER_VOLUME:-persistent-vscode-server}
  persistent-bash-history:
    name: ${DEVCONTAINER_BASH_HISTORY_VOLUME:-persistent-bash-history}
