name: release

# Build a signed Android APK and attach it to a GitHub Release whenever a
# `v*` tag is pushed (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# The in-app update check (apps/web/src/native/UpdateCheck.tsx) reads the
# latest release and prompts users to download the new APK.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so we can build a changelog

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          RANGE="${TAG}"
          [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          # These notes are shown verbatim in the in-app update prompt, so list
          # only changes an end user cares about. Drop internal-only commits:
          # version bumps/merges, docs, chores/tooling/CI, deps, refactors/tests,
          # and security-header plumbing. Tune EXCLUDE if a category should
          # resurface. A commit that mixes user-facing + internal work is dropped
          # if it matches any term, so prefer splitting such commits.
          EXCLUDE='^- (bump version|merge )|\b(docs?|documentation|readme|changelog|jsdoc|chore|ci|workflow|lint|eslint|prettier|typecheck|tsconfig|devcontainer|dockerfile|compose|gitignore|deps?|dependency|dependencies|refactor|rename|cleanup|clean up|tidy|reorganize|restructure|test|tests|spec|csp|coop|coep|cors|co-?authored?)\b'
          CHANGES=$(git log --no-merges --pretty=format:'- %s' "$RANGE" | grep -viE "$EXCLUDE" || true)
          [ -z "$CHANGES" ] && CHANGES="- Maintenance and behind-the-scenes improvements"
          {
            echo "## What's changed"
            echo
            echo "$CHANGES"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Build web bundle
        run: |
          npm run build --workspace @persistent/shared
          npm run build --workspace @persistent/web

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed APK
        working-directory: apps/mobile
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          npx cap add android
          npm run setup:android
          # FCM client config: write google-services.json so the google-services
          # gradle plugin activates. Skipped (build still succeeds, FCM inert) when
          # the secret isn't set, e.g. on forks.
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "wrote android/app/google-services.json"
          else
            echo "GOOGLE_SERVICES_JSON not set — building without FCM"
          fi
          npx cap sync android
          # `direct` is the sideloaded flavor — it keeps the in-app updater that
          # GitHub-release installs rely on. The `play` flavor omits it (Play
          # forbids self-updating), so it must never be the artifact published here.
          npm run assemble:release
          npm run bundle:play

      - name: Stage APK
        run: |
          cp apps/mobile/android/app/build/outputs/apk/direct/release/app-direct-release.apk \
             "persistent-${{ steps.ver.outputs.name }}.apk"

      - name: Stage Play bundle
        run: |
          cp apps/mobile/android/app/build/outputs/bundle/playRelease/app-play-release.aab \
             "persistent-${{ steps.ver.outputs.name }}-play.aab"

      # The AAB is a workflow artifact, not a release asset: it is for uploading to
      # the Play Console, and publishing it next to the sideload APK would invite
      # installing the wrong one.
      - name: Upload Play bundle
        uses: actions/upload-artifact@v4
        with:
          name: play-bundle-${{ steps.ver.outputs.name }}
          path: persistent-*-play.aab
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: persistent-*.apk
